<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiliCart </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #eaeded; font-family: Arial, sans-serif; }
        .bg-amazon-dark { background-color: #131921; }
        .btn-amazon { background-color: #ffd814; border: 1px solid #fcd200; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-amazon:hover { background-color: #f7ca00; }
        .hidden { display: none; }
        .product-card { background: white; border: 1px solid transparent; transition: 0.3s; cursor: pointer; }
        .product-card:hover { border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="bg-amazon-dark text-white p-2 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center">
            <h1 class="text-2xl font-bold ml-4 italic cursor-pointer" onclick="location.reload()">DILICART</h1>
        </div>

        <div class="flex items-center gap-6 mr-4">
            <div onclick="toggleAuthModal()" class="cursor-pointer text-sm">
                <p id="user-display">Hello, Sign in</p>
                <p class="font-bold">Account & Lists</p>
            </div>
            
            <div onclick="toggleAdminModal()" class="cursor-pointer text-xs bg-gray-700 px-2 py-1 rounded hover:bg-red-600">
                Admin
            </div>

            <div onclick="toggleCart()" class="relative cursor-pointer">
                <span id="cart-badge" class="absolute -top-2 left-4 text-[#febd69] font-bold text-lg">0</span>
                <span class="text-3xl">🛒</span>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-4">
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/70 hidden z-[200] flex items-center justify-center">
        <div class="bg-white p-8 rounded w-80 text-black shadow-2xl">
            <h2 class="text-xl font-bold mb-4 border-b pb-2 text-center">Sign-In / Join</h2>
            <div class="space-y-4">
                <input type="text" id="auth-name" placeholder="Your Name" class="w-full border p-2 rounded focus:outline-yellow-500">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full border p-2 rounded focus:outline-yellow-500">
                <input type="address" id="Address" placeholder="address" class="w-full border p-2 rounded focus:outline-yellow-500">
                <input type="number" id="mobile number" placeholder="mobile number" class="w-full border p-2 rounded focus:outline-yellow-500">
                <button onclick="handleAuth()" class="btn-amazon w-full py-2 font-bold shadow-md">Continue</button>
                <p class="text-[10px] text-center text-gray-500">By continuing, you agree to DiliCart's Conditions of Use.</p>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="fixed inset-0 bg-black/80 hidden z-[150] flex items-center justify-center p-4">
        <div class="bg-white max-w-4xl w-full rounded-lg flex flex-col md:flex-row overflow-hidden relative">
            <button onclick="closeDetails()" class="absolute top-4 right-4 text-3xl">&times;</button>
            <div class="md:w-1/2 p-8 bg-white flex items-center justify-center">
                <img id="detail-img" src="" class="max-h-80 object-contain">
            </div>
            <div class="md:w-1/2 p-8 flex flex-col justify-center">
                <h2 id="detail-name" class="text-2xl font-bold mb-2"></h2>
                <p class="text-green-700 font-medium mb-2 italic text-sm underline">FREE Delivery Tomorrow</p>
                <p id="detail-price" class="text-3xl font-bold mb-4 text-red-800"></p>
                <p id="detail-desc" class="text-gray-600 mb-8 text-sm"></p>
                <div class="flex gap-4">
                    <button id="detail-add-btn" class="btn-amazon flex-1 py-3 font-bold">Add to Cart</button>
                    <button id="detail-buy-btn" class="bg-[#ffa41c] hover:bg-[#fa8900] rounded-lg flex-1 py-3 font-bold shadow-md">Buy Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-drawer" class="fixed right-0 top-0 h-full w-80 bg-white shadow-2xl translate-x-full transition-transform z-[100] flex flex-col text-black">
        <div class="p-4 border-b bg-gray-100 flex justify-between items-center">
            <h3 class="font-bold">Shopping Cart</h3>
            <button onclick="toggleCart()" class="text-2xl">&times;</button>
        </div>
        <div id="cart-items" class="p-4 flex-1 overflow-y-auto space-y-4"></div>
        <div class="p-4 border-t bg-gray-50">
            <p class="text-lg font-bold">Subtotal: <span id="cart-total" class="text-red-700">₹0</span></p>
            <button onclick="placeOrder()" class="btn-amazon w-full py-2 mt-4 font-bold">Checkout (COD)</button>
        </div>
    </div>

    <div id="admin-modal" class="fixed inset-0 bg-black/90 hidden z-[400] overflow-y-auto p-4 text-black">
        <div class="bg-white max-w-5xl mx-auto rounded-lg p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold border-l-4 border-red-600 pl-2">Admin Panel</h2>
                <button onclick="toggleAdminModal()" class="text-3xl">&times;</button>
            </div>
            <div class="grid md:grid-cols-2 gap-8">
                <div class="bg-gray-100 p-4 rounded shadow-inner">
                    <h3 class="font-bold mb-4 text-blue-700 underline">Add Product</h3>
                    <input type="text" id="p-name" placeholder="Name" class="w-full border p-2 mb-2">
                    <input type="number" id="p-price" placeholder="Price" class="w-full border p-2 mb-2">
                    <input type="text" id="p-img" placeholder="Image URL" class="w-full border p-2 mb-2">
                    <textarea id="p-desc" placeholder="Product Description" class="w-full border p-2 mb-4"></textarea>
                    <button onclick="adminAddProduct()" class="bg-green-600 text-white w-full py-2 font-bold hover:bg-green-700 transition">Save to Database</button>
                </div>
                <div class="bg-gray-100 p-4 rounded shadow-inner">
                    <h3 class="font-bold mb-4 text-blue-700 underline">Incoming Orders</h3>
                    <div id="admin-orders-list" class="space-y-2 h-72 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>


            <div class="flex-1 relative">
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-cyan-500/30 blur-[80px] rounded-full"></div>
                
                <div class="relative animate-[float_6s_ease-in-out_infinite]">
                    <img src="https://m.media-amazon.com/images/I/71o8Q5h63KL._SL1500_.jpg" 
                         alt="Tech Device" 
                         class="w-full max-w-[450px] mx-auto drop-shadow-[0_35px_35px_rgba(34,211,238,0.25)]">
                </div>
            </div>

        </div>
    </div>
</section>

<style>
    @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-25px) rotate(2deg); }
    }
    
    /* Smooth transition for gradient text */
    .bg-clip-text {
        -webkit-background-clip: text;
        background-clip: text;
    }
</style>
    <script>
        const API_URL = "https://felicity-dilicart.onrender.com/api";
        let cart = [];
        let allProducts = [];

        window.onload = () => { fetchProducts(); updateUserUI(); };

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                allProducts = await res.json();
                document.getElementById('products-grid').innerHTML = allProducts.map(p => `
                    <div class="product-card p-4 rounded flex flex-col text-black shadow-sm" onclick="openDetails('${p._id}')">
                        <img src="${p.image}" class="h-44 object-contain mb-4">
                        <h3 class="text-sm font-medium line-clamp-2 h-10">${p.name}</h3>
                        <p class="text-xl font-bold mt-2">₹${p.price.toLocaleString()}</p>
                        <button onclick="event.stopPropagation(); addToCart('${p._id}')" class="btn-amazon py-1.5 text-xs mt-4 font-bold">Add to Cart</button>
                    </div>
                `).join('');
            } catch (e) { console.error("Server connection lost."); }
        }

        function openDetails(id) {
            const p = allProducts.find(item => item._id === id);
            document.getElementById('detail-img').src = p.image;
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = `₹${p.price.toLocaleString()}`;
            document.getElementById('detail-desc').innerText = p.description || "Premium quality product with guaranteed satisfaction.";
            
            document.getElementById('detail-add-btn').onclick = () => { addToCart(id); closeDetails(); };
            document.getElementById('detail-buy-btn').onclick = () => { addToCart(id); closeDetails(); toggleCart(); };
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetails() { document.getElementById('detail-modal').classList.add('hidden'); }

        function addToCart(id) {
            const product = allProducts.find(p => p._id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-badge').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `₹${total.toLocaleString()}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, idx) => `
                <div class="flex gap-2 border-b pb-2 bg-white p-2 rounded shadow-sm">
                    <img src="${item.image}" class="w-12 h-12 object-contain">
                    <div class="flex-1">
                        <p class="font-bold text-[10px] line-clamp-1">${item.name}</p>
                        <p class="text-red-700 text-xs font-bold">₹${item.price.toLocaleString()}</p>
                        <button onclick="cart.splice(${idx},1);updateCartUI()" class="text-blue-600 text-[10px] underline">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('translate-x-full'); }
        function toggleAuthModal() { document.getElementById('auth-modal').classList.toggle('hidden'); }
        function toggleAdminModal() { 
            document.getElementById('admin-modal').classList.toggle('hidden'); 
            if(!document.getElementById('admin-modal').classList.contains('hidden')) fetchAdminOrders();
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const name = document.getElementById('auth-name').value;
            if(!email || !name) return alert("Fill all fields");

            const res = await fetch(`${API_URL}/user/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email, name })
            });
            const data = await res.json();
            if(data.success) {
                localStorage.setItem('DILICART-users', JSON.stringify(data.user));
                updateUserUI();
                toggleAuthModal();
            }
        }

        function updateUserUI() {
            const user = JSON.parse(localStorage.getItem('DILICART-users'));
            if(user) document.getElementById('user-display').innerHTML = `Hello, ${user.name.split(' ')[0]}<br><b class="text-white">Account & Lists</b>`;
        }

        async function placeOrder() {
    const user = JSON.parse(localStorage.getItem('DILICART-users'));
    if(!user) {
        alert("Pehle Sign-in karein!");
        return toggleAuthModal();
    }
    if(cart.length === 0) return alert("Cart khali hai!");

    const total = cart.reduce((s, i) => s + i.price, 0);
    
    try {
        const res = await fetch(`${API_URL}/orders`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                userName: user.name,
                userEmail: user.email,
                items: cart,
                totalAmount: total
            })
        });

        const data = await res.json();
        
        if(res.ok || data.success) {
            // Modal ko show karne ke liye 'hidden' class remove karein
            document.getElementById('success-screen').classList.remove('hidden');
            document.getElementById('final-id').innerText = `ORDER-ID: ${data.orderId || 'SUCCESS'}`;
            cart = []; 
            updateCartUI();
        } else {
            alert("Order failed: " + (data.message || "Server error"));
        }
    } catch (e) {
        alert("Server connection issue. Please try again.");
    }
}
        async function adminAddProduct() {
            const product = {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                image: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value
            };
            const res = await fetch(`${API_URL}/admin/add-product`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(product)
            });
            if(res.ok) { alert("Product Added Successfully!"); location.reload(); }
        }

        async function fetchAdminOrders() {
            const res = await fetch(`${API_URL}/admin/orders`);
            const orders = await res.json();
            document.getElementById('admin-orders-list').innerHTML = orders.map(o => `
                <div class="p-3 border rounded bg-white text-xs mb-2">
                    <p><b>User:</b> ${o.userName} (${o.userEmail})</p>
                    <p><b>Total:</b> ₹${o.totalAmount.toLocaleString()}</p>
                    <p><b>Status:</b> <span class="text-orange-600 font-bold">${o.status}</span></p>
                    <p class="text-[10px] text-gray-400 mt-1">Date: ${new Date(o.createdAt).toLocaleDateString()}</p>
                </div>
            `).join('');
        }
        <div id="success-screen" class="fixed inset-0 bg-black/90 hidden z-[500] flex items-center justify-center p-4 text-black">
    <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl font-bold">✓</div>
        <h2 class="text-2xl font-black mb-2">Order Confirmed!</h2>
        <p class="text-slate-500 text-sm mb-6">Your order has been placed successfully via Cash on Delivery.</p>
        <div id="final-id" class="bg-slate-100 p-3 rounded-xl font-mono text-xs font-bold text-slate-600 mb-6"></div>
        <button onclick="location.reload()" class="w-full bg-amazon-dark text-white py-4 rounded-2xl font-bold shadow-lg">Continue Shopping</button>
    </div>
</div>
    </script>
</body>
</html>

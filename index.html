<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiliCart | Night Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-night-dark { background-color: #0f172a; border-bottom: 1px solid rgba(34, 211, 238, 0.2); }
        .btn-neon { background: linear-gradient(135deg, #22d3ee, #3b82f6); color: #020617; border-radius: 12px; font-weight: 800; transition: 0.3s; box-shadow: 0 4px 15px rgba(34, 211, 238, 0.3); }
        .btn-neon:hover { box-shadow: 0 4px 25px rgba(34, 211, 238, 0.6); transform: translateY(-2px); }
        .product-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.4s; cursor: pointer; border-radius: 20px; }
        .product-card:hover { border: 1px solid rgba(34, 211, 238, 0.4); box-shadow: 0 10px 40px rgba(34, 211, 238, 0.15); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="bg-night-dark text-white p-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center">
            <h1 class="text-3xl font-extrabold ml-4 italic tracking-tighter cursor-pointer" onclick="location.reload()">DILICART<span class="text-cyan-400">.</span></h1>
        </div>

        <div class="flex items-center gap-6 mr-4">
            <div onclick="toggleAuthModal()" class="cursor-pointer text-sm bg-white/5 px-4 py-2 rounded-full border border-white/10 hover:border-cyan-500/50">
                <p id="user-display" class="text-slate-400">Sign in</p>
                <p class="font-bold text-xs uppercase tracking-widest text-white">Account</p>
            </div>
            
            <div onclick="toggleCart()" class="relative cursor-pointer flex items-center gap-2 bg-white/5 px-4 py-3 rounded-full border border-white/10">
                <span id="cart-badge" class="absolute -top-1 -right-1 bg-cyan-500 text-[#020617] font-black text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
                <span class="text-2xl">🛒</span>
            </div>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-6">
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            </div>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-black/80 hidden z-[200] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-[#0f172a] p-10 rounded-[2.5rem] w-full max-w-md border border-white/10">
            <h2 class="text-2xl font-black mb-6 text-center italic tracking-tighter uppercase">Sign-In / <span class="text-cyan-400">Join</span></h2>
            <div class="space-y-4">
                <input type="text" id="auth-name" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-cyan-500 outline-none text-white transition">
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-cyan-500 outline-none text-white transition">
                <input type="text" id="auth-mobile" placeholder="Mobile Number" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-cyan-500 outline-none text-white transition">
                <textarea id="auth-address" placeholder="Delivery Address" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl focus:border-cyan-500 outline-none text-white transition h-24"></textarea>
                <button onclick="handleAuth()" class="btn-neon w-full py-4 text-xl mt-4">Continue</button>
            </div>
        </div>
    </div>

    <div id="detail-modal" class="fixed inset-0 bg-black/90 hidden z-[150] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-[#0f172a] max-w-4xl w-full rounded-[2.5rem] flex flex-col md:flex-row overflow-hidden border border-white/10 relative">
            <button onclick="closeDetails()" class="absolute top-6 right-6 text-white text-4xl">&times;</button>
            <div class="md:w-1/2 p-10 bg-white/5 flex items-center justify-center border-r border-white/10">
                <img id="detail-img" src="" class="max-h-80 object-contain drop-shadow-[0_0_20px_rgba(34,211,238,0.2)]">
            </div>
            <div class="md:w-1/2 p-10 flex flex-col justify-center">
                <h2 id="detail-name" class="text-3xl font-bold mb-4 tracking-tighter"></h2>
                <p id="detail-price" class="text-4xl font-black mb-6 text-white italic"></p>
                <p id="detail-desc" class="text-slate-400 mb-10 text-sm leading-relaxed"></p>
                <div class="flex gap-4">
                    <button id="detail-add-btn" class="flex-1 bg-white/5 border border-white/10 py-4 rounded-xl font-bold hover:bg-white/10">Add to Cart</button>
                    <button id="detail-buy-btn" class="btn-neon flex-1 py-4 text-lg">Buy Now</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-drawer" class="fixed right-0 top-0 h-full w-80 bg-[#0f172a] shadow-2xl translate-x-full transition-transform z-[100] flex flex-col border-l border-white/10">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <h3 class="font-bold">Shopping Cart</h3>
            <button onclick="toggleCart()" class="text-3xl">&times;</button>
        </div>
        <div id="cart-items" class="p-6 flex-1 overflow-y-auto space-y-4"></div>
        <div class="p-6 border-t border-white/10 bg-white/5">
            <p class="text-xl font-bold">Total: <span id="cart-total" class="text-cyan-400 italic">₹0</span></p>
            <button onclick="placeOrder()" class="btn-neon w-full py-4 mt-6 text-lg">Checkout (COD)</button>
        </div>
    </div>

    <div id="success-screen" class="fixed inset-0 bg-black/95 hidden z-[500] flex items-center justify-center p-6">
        <div class="bg-[#0f172a] p-10 rounded-[3rem] max-w-sm w-full text-center border-4 border-cyan-500 shadow-[0_0_50px_rgba(34,211,238,0.3)]">
            <div class="w-20 h-20 bg-cyan-500 text-[#020617] rounded-full flex items-center justify-center mx-auto mb-6 text-4xl font-bold italic">OK</div>
            <h2 class="text-2xl font-black mb-2 uppercase italic tracking-tighter">Order Success!</h2>
            <p class="text-slate-500 text-sm mb-8">Details have been sent to our Executive Dashboard.</p>
            <div id="final-id" class="bg-black/50 p-4 rounded-xl font-mono text-xs text-cyan-400 border border-white/10 mb-6"></div>
            <button onclick="location.reload()" class="w-full bg-white text-[#020617] py-4 rounded-2xl font-black uppercase">Continue</button>
        </div>
    </div>

    <script>
        const API_URL = "https://felicity-dilicart.onrender.com/api";
        let cart = [];
        let allProducts = [];

        window.onload = () => { fetchProducts(); updateUserUI(); };

        async function fetchProducts() {
            try {
                const res = await fetch(`${API_URL}/products`);
                allProducts = await res.json();
                document.getElementById('products-grid').innerHTML = allProducts.map(p => `
                    <div class="product-card p-6 flex flex-col" onclick="openDetails('${p._id}')">
                        <img src="${p.image}" class="h-44 object-contain mb-6 drop-shadow-[0_5px_15px_rgba(255,255,255,0.05)]">
                        <h3 class="text-sm font-medium line-clamp-2 h-10 text-slate-200">${p.name}</h3>
                        <p class="text-2xl font-black mt-3 italic">₹${p.price.toLocaleString()}</p>
                        <button onclick="event.stopPropagation(); addToCart('${p._id}')" class="btn-neon py-2.5 text-xs mt-6">Add to Cart</button>
                    </div>
                `).join('');
            } catch (e) { console.error("Server Down"); }
        }

        function openDetails(id) {
            const p = allProducts.find(item => item._id === id);
            document.getElementById('detail-img').src = p.image;
            document.getElementById('detail-name').innerText = p.name;
            document.getElementById('detail-price').innerText = `₹${p.price.toLocaleString()}`;
            document.getElementById('detail-desc').innerText = p.description || "Premium build next-gen product.";
            document.getElementById('detail-add-btn').onclick = () => { addToCart(id); closeDetails(); };
            document.getElementById('detail-buy-btn').onclick = () => { addToCart(id); closeDetails(); toggleCart(); };
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function closeDetails() { document.getElementById('detail-modal').classList.add('hidden'); }

        function addToCart(id) {
            const product = allProducts.find(p => p._id === id);
            cart.push(product);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-badge').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('cart-total').innerText = `₹${total.toLocaleString()}`;
            document.getElementById('cart-items').innerHTML = cart.map((item, idx) => `
                <div class="flex gap-3 border-b border-white/5 pb-3 bg-white/5 p-3 rounded-xl">
                    <img src="${item.image}" class="w-14 h-14 object-contain rounded-lg">
                    <div class="flex-1">
                        <p class="font-bold text-[10px] text-slate-100">${item.name}</p>
                        <p class="text-cyan-400 text-xs font-black italic">₹${item.price.toLocaleString()}</p>
                        <button onclick="cart.splice(${idx},1);updateCartUI()" class="text-red-400 text-[10px] underline">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() { document.getElementById('cart-drawer').classList.toggle('translate-x-full'); }
        function toggleAuthModal() { document.getElementById('auth-modal').classList.toggle('hidden'); }

        async function handleAuth() {
            const name = document.getElementById('auth-name').value;
            const email = document.getElementById('auth-email').value;
            const mobile = document.getElementById('auth-mobile').value;
            const address = document.getElementById('auth-address').value;

            if(!name || !email || !mobile || !address) return alert("Puri details bharo bhai!");

            try {
                const res = await fetch(`${API_URL}/user/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email, name }) 
                });
                const data = await res.json();
                if(data.success) {
                    const userData = { name, email, mobile, address }; 
                    localStorage.setItem('DILICART-users', JSON.stringify(userData));
                    updateUserUI();
                    toggleAuthModal();
                }
            } catch (e) { alert("Login failed!"); }
        }

        function updateUserUI() {
            const user = JSON.parse(localStorage.getItem('DILICART-users'));
            if(user) document.getElementById('user-display').innerHTML = `Hello, ${user.name.split(' ')[0]}<br><b class="text-white">Profile Loaded</b>`;
        }

        async function placeOrder() {
            const user = JSON.parse(localStorage.getItem('DILICART-users'));
            if(!user) return toggleAuthModal();
            if(cart.length === 0) return alert("Cart khali hai!");

            const total = cart.reduce((s, i) => s + i.price, 0);
            try {
                const res = await fetch(`${API_URL}/orders`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        userName: user.name,
                        userEmail: user.email,
                        address: user.address,
                        mobile: user.mobile,
                        items: cart,
                        totalAmount: total
                    })
                });
                const data = await res.json();
                if(res.ok) {
                    document.getElementById('success-screen').classList.remove('hidden');
                    document.getElementById('final-id').innerText = `TXN-ID: ${data.orderId || 'SUCCESS'}`;
                    cart = []; 
                    updateCartUI();
                }
            } catch (e) { alert("Order Error!"); }
        }
    </script>
</body>
</html>

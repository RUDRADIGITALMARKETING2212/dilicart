<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiliCart | Pulse Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fafafa; font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .founder-border { border-top: 4px solid #f59e0b; }
        .manager-border { border-top: 4px solid #3b82f6; }
        .hidden { display: none !important; }
        input, textarea { background: #111 !important; border: 1px solid #222 !important; color: white; border-radius: 12px; padding: 12px; }
        input:focus { border-color: #f59e0b; outline: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="w-full max-w-sm glass p-10 rounded-[2.5rem] text-center">
            <h1 class="text-2xl font-bold mb-8 italic tracking-tighter">DILICART<span class="text-amber-500">.</span>SYSTEM</h1>
            <input type="password" id="passkey" placeholder="Enter Access Key" class="w-full text-center text-xl mb-4 tracking-widest">
            <button onclick="login()" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-amber-500 transition-all">BOOT SYSTEM</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50 mb-6">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-black bg-amber-500">?</div>
                <div>
                    <p id="user-name" class="font-bold text-sm">User</p>
                    <p id="user-role" class="text-[9px] uppercase tracking-widest text-slate-500"></p>
                </div>
            </div>
            <button onclick="logout()" class="text-xs font-bold text-red-500 px-3 py-1 border border-red-500/20 rounded-lg">SHUTDOWN</button>
        </nav>

        <div class="max-w-7xl mx-auto px-6 grid lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div id="founder-stats" class="glass p-6 rounded-[2rem] hidden">
                    <h3 class="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">System Overview</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-2xl text-center">
                            <p class="text-[10px] text-amber-500">REVENUE</p>
                            <p id="rev-val" class="text-lg font-bold">₹0</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl text-center">
                            <p class="text-[10px] text-blue-500">INVENTORY</p>
                            <p id="inv-val" class="text-lg font-bold">0</p>
                        </div>
                    </div>
                </div>

                <div class="glass p-8 rounded-[2.5rem]">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                        <span class="w-1 h-6 bg-green-500 rounded-full"></span> Register Asset
                    </h3>
                    <div class="space-y-4 flex flex-col">
                        <input type="text" id="p-name" placeholder="Item Title">
                        <input type="number" id="p-price" placeholder="Price (₹)">
                        <input type="text" id="p-img" placeholder="Image URL">
                        <textarea id="p-desc" placeholder="Specifications..."></textarea>
                        <button onclick="postProduct()" class="bg-white text-black font-bold py-4 rounded-xl hover:bg-green-500 transition-all">PUSH TO DATABASE</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div id="performance-section" class="glass p-8 rounded-[2.5rem] hidden">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-amber-500 mb-6 italic">Agent Performance Scoreboard</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead class="text-slate-500">
                                <tr>
                                    <th class="pb-4">AGENT</th>
                                    <th class="pb-4">ROLE</th>
                                    <th class="pb-4">UPLOADS</th>
                                    <th class="pb-4">SHIPPED</th>
                                </tr>
                            </thead>
                            <tbody id="performance-rows" class="font-bold">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div>
                    <h3 class="text-sm font-bold uppercase mb-6 tracking-widest text-slate-500">Active Transmissions</h3>
                    <div id="order-feed" class="grid md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://felicity-dilicart.onrender.com/api";
        const USERS = {
            "rudra2212": { name: "Rudra Garg", role: "FOUNDER", theme: "founder-border" },
            "anupam2212": { name: "Anupam Pandey", role: "manager", theme: "manager-border" },
            "anand@2212": { name: "Anand Shukla", role: "FOUNDER", theme: "founder-border" },
            "manager1": { name: "Mohit Kumar", role: "MANAGER", theme: "manager-border" }
        };

        function login() {
            const key = document.getElementById('passkey').value;
            const user = USERS[key];
            if (user) {
                sessionStorage.setItem('dili_session', JSON.stringify(user));
                initUI(user);
            } else { alert("Error: Access Code Invalid."); }
        }

        function initUI(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.body.className = user.theme;
            
            document.getElementById('user-name').innerText = user.name;
            document.getElementById('user-role').innerText = user.role;
            document.getElementById('user-avatar').innerText = user.name[0];
            document.getElementById('user-avatar').style.background = user.role === 'FOUNDER' ? '#f59e0b' : '#3b82f6';

            if(user.role === 'FOUNDER') {
                document.getElementById('founder-stats').classList.remove('hidden');
                document.getElementById('performance-section').classList.remove('hidden');
            }
            loadData(user);
        }

        async function loadData(user) {
            const [pRes, oRes] = await Promise.all([
                fetch(`${API}/products`),
                fetch(`${API}/admin/orders`)
            ]);
            const products = await pRes.json();
            const orders = await oRes.json();

            if(user.role === 'FOUNDER') {
                document.getElementById('inv-val').innerText = products.length;
                const rev = orders.reduce((s, o) => s + o.totalAmount, 0);
                document.getElementById('rev-val').innerText = `₹${rev.toLocaleString()}`;
                
                // Logic for Performance Table
                renderPerformance(products, orders);
            }
            renderOrders(orders, user);
        }

        function renderPerformance(products, orders) {
            const rows = document.getElementById('performance-rows');
            // Hum yahan check kar rahe hain kisne kya kiya (Backend data assumption)
            const staff = ["Anand Shukla", "Anupam Pandey", "Rudra Garg", "Mohit Kumar"];
            rows.innerHTML = staff.map(name => {
                const uploads = products.filter(p => p.addedBy === name).length;
                const shipped = orders.filter(o => o.deliveredBy === name).length;
                const isManager = USERS[Object.keys(USERS).find(k => USERS[k].name === name)].role === "MANAGER";
                
                return `
                    <tr class="border-t border-white/5">
                        <td class="py-4">${name}</td>
                        <td class="py-4 ${isManager ? 'text-blue-400' : 'text-amber-500'}">${isManager ? 'MANAGER' : 'FOUNDER'}</td>
                        <td class="py-4">${uploads}</td>
                        <td class="py-4 text-green-400">${shipped}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderOrders(orders, user) {
            const feed = document.getElementById('order-feed');
            feed.innerHTML = orders.reverse().map(o => `
                <div class="glass p-6 rounded-[2rem]">
                    <div class="flex justify-between items-start mb-4">
                        <h4 class="font-bold text-white">${o.userName}</h4>
                        <p class="text-amber-500 font-black">₹${o.totalAmount}</p>
                    </div>
                    <p class="text-[10px] text-slate-500 mb-4">${o.address}</p>
                    <button onclick="deliverOrder('${o._id}')" class="w-full py-3 bg-white/5 hover:bg-green-500 hover:text-black rounded-xl text-[10px] font-bold uppercase transition-all">
                        Complete as ${user.name}
                    </button>
                </div>
            `).join('');
        }

        async function postProduct() {
            const user = JSON.parse(sessionStorage.getItem('dili_session'));
            const p = {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                image: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value,
                addedBy: user.name // TRACKING WHO ADDED
            };
            const res = await fetch(`${API}/admin/add-product`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(p)
            });
            if(res.ok) { alert(`Asset Logged by ${user.name}`); location.reload(); }
        }

        async function deliverOrder(id) {
            const user = JSON.parse(sessionStorage.getItem('dili_session'));
            if(!confirm("Mark as shipped by you?")) return;
            // NOTE: Yahan API mein "deliveredBy" update karne ki logic honi chahiye
            const res = await fetch(`${API}/admin/order/${id}`, { method: 'DELETE' });
            if(res.ok) {
                alert(`Order marked as delivered by ${user.name}`);
                location.reload();
            }
        }

        function logout() { sessionStorage.clear(); location.reload(); }
        window.onload = () => {
            const session = sessionStorage.getItem('dili_session');
            if (session) initUI(JSON.parse(session));
        };
    </script>
</body>
</html>

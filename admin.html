<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiliCart | Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #080d17; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-border-cyan { border: 1px solid rgba(34, 211, 238, 0.3); }
        .gradient-text { background: linear-gradient(135deg, #22d3ee, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <div id="auth-screen" class="fixed inset-0 z-[5000] bg-[#080d17] flex items-center justify-center p-6">
        <div class="glass-card p-10 rounded-[3rem] w-full max-w-md text-center shadow-2xl neon-border-cyan">
            <div class="w-20 h-20 bg-cyan-500/10 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-cyan-500/20">
                <span class="text-4xl">🔐</span>
            </div>
            <h2 class="text-2xl font-black mb-2 tracking-tighter uppercase italic">DiliCart <span class="text-cyan-400">Secure</span></h2>
            <p class="text-slate-500 text-xs mb-8 font-bold uppercase tracking-widest">Admin Authorization Required</p>
            
            <input type="password" id="passkey" placeholder="••••••••" 
                   class="w-full bg-white/5 border border-white/10 px-6 py-4 rounded-2xl text-center text-2xl tracking-[0.5em] text-cyan-400 focus:outline-none focus:border-cyan-500 mb-6 transition-all">
            
            <button onclick="login()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-[#080d17] py-4 rounded-2xl font-black transition-all shadow-lg shadow-cyan-500/20">
                Unlock Terminal
            </button>
            <p id="auth-error" class="text-red-500 text-xs mt-4 hidden font-bold italic">Invalid Passkey! Access Denied.</p>
        </div>
    </div>

    <aside id="sidebar" class="w-72 hidden lg:flex flex-col p-8 glass-card border-r sticky top-0 h-screen">
        <div class="mb-12">
            <h1 class="text-xl font-800 italic tracking-tighter">DILICART<span class="text-cyan-400">.</span>CORE</h1>
        </div>

        <div class="mb-10 p-5 bg-white/5 rounded-[2rem] border border-white/5 flex items-center gap-4">
            <div id="avatar" class="w-12 h-12 rounded-2xl flex items-center justify-center font-black text-slate-900 text-xl shadow-lg">?</div>
            <div>
                <p id="user-role" class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">FOUNDER/DIRECTOR</p>
                <p id="user-name" class="font-bold text-white text-sm">Loading...</p>
            </div>
        </div>

        <nav class="space-y-4 flex-1">
            <button class="w-full text-left px-5 py-3 rounded-2xl bg-cyan-500/10 text-cyan-400 font-bold border border-cyan-500/20 flex items-center gap-3">📊 Analytics</button>
            <button onclick="window.location.href='index.html'" class="w-full text-left px-5 py-3 rounded-2xl text-slate-400 hover:bg-white/5 transition flex items-center gap-3">🏠 View Store</button>
            <button onclick="logout()" class="w-full text-left px-5 py-3 rounded-2xl text-red-400 hover:bg-red-500/10 transition flex items-center gap-3 mt-auto">🚪 Terminate Session</button>
        </nav>
    </aside>

    <main id="dashboard" class="flex-1 p-10 hidden">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-6">
            <div>
                <h2 class="text-5xl font-black mb-2 tracking-tighter">Control <span class="gradient-text">Center</span></h2>
                <p class="text-slate-400 font-medium">Monitoring DiliCart operations in real-time.</p>
            </div>
            
            <div class="flex gap-4">
                <div class="glass-card px-8 py-4 rounded-[2rem] text-center neon-border-cyan">
                    <p class="text-[9px] text-cyan-400 font-bold uppercase mb-1">Total Earnings</p>
                    <p id="total-revenue" class="text-2xl font-black text-white italic">₹0</p>
                </div>
                <div class="glass-card px-8 py-4 rounded-[2rem] text-center">
                    <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Live Inventory</p>
                    <p id="p-count" class="text-2xl font-black text-white">0</p>
                </div>
            </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="lg:col-span-1">
                <div class="glass-card p-8 rounded-[2.5rem] sticky top-10">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-3">
                        <span class="w-2 h-6 bg-cyan-500 rounded-full"></span> List New Asset
                    </h3>
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="Product Name" class="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl focus:border-cyan-500 outline-none text-sm transition-all">
                        <input type="number" id="p-price" placeholder="Price (₹)" class="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl focus:border-cyan-500 outline-none text-sm transition-all">
                        <input type="text" id="p-img" placeholder="Image URL" class="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl focus:border-cyan-500 outline-none text-sm transition-all">
                        <textarea id="p-desc" placeholder="Product details..." class="w-full bg-white/5 border border-white/10 px-5 py-4 rounded-2xl focus:border-cyan-500 outline-none text-sm h-32"></textarea>
                        <button onclick="addProduct()" class="w-full bg-cyan-500 hover:bg-cyan-400 text-[#080d17] py-4 rounded-2xl font-black transition-all shadow-lg shadow-cyan-500/20">🚀 Push to Live</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass-card p-8 rounded-[2.5rem] flex flex-col min-h-[600px]">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-lg font-bold flex items-center gap-3">
                            <span class="w-2 h-6 bg-blue-500 rounded-full"></span> Incoming Transmissions
                        </h3>
                        <span id="order-count-badge" class="bg-blue-500/10 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-full border border-blue-500/20">0 ORDERS</span>
                    </div>

                    <div id="order-feed" class="space-y-6">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Is line ko dhyaan se badlein:
const API = "https://felicity-dilicart.onrender.com/api"; 

const ADMIN_DB = {
    "anupam2212": { name: "Anupam Pandey", initial: "U", color: "#8b5cf6" },
    "anand2212": { name: "Anand Shukla", initial: "A", color: "#3b82f6" },
    // Aap apna passkey bhi yahan add kar sakte hain
    "rudra2212": { name: "Rudra", initial: "R", color: "#22d3ee" } 
};

        // --- AUTH LOGIC ---
        function login() {
            const pass = document.getElementById('passkey').value;
            if (ADMIN_DB[pass]) {
                sessionStorage.setItem('admin_session', JSON.stringify(ADMIN_DB[pass]));
                initDashboard(ADMIN_DB[pass]);
            } else {
                const error = document.getElementById('auth-error');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        }

        function initDashboard(user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('sidebar').classList.remove('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            
            document.getElementById('user-name').innerText = user.name;
            const av = document.getElementById('avatar');
            av.innerText = user.initial;
            av.style.backgroundColor = user.color;
            
            syncData();
        }

        // --- CORE DATA SYNC ---
        async function syncData() {
            try {
                // Get Products
                const pRes = await fetch(`${API}/products`);
                const products = await pRes.json();
                document.getElementById('p-count').innerText = products.length;

                // Get Orders
                const oRes = await fetch(`${API}/admin/orders`);
                const orders = await oRes.json();
                
                // Calculate Total Earnings (Sales Analytics)
                const revenue = orders.reduce((sum, o) => sum + o.totalAmount, 0);
                document.getElementById('total-revenue').innerText = `₹${revenue.toLocaleString()}`;
                document.getElementById('order-count-badge').innerText = `${orders.length} ORDERS`;

                renderOrders(orders);
            } catch (err) { console.error("Sync Failed"); }
        }

        function renderOrders(orders) {
            const feed = document.getElementById('order-feed');
            if(orders.length === 0) {
                feed.innerHTML = `<div class="text-center py-20 opacity-20"><span class="text-6xl">📡</span><p class="font-bold mt-4">Waiting for customer signals...</p></div>`;
                return;
            }

            feed.innerHTML = orders.map(o => `
                <div class="bg-white/5 border border-white/5 p-6 rounded-[2rem] hover:bg-white/[0.07] transition-all group border-l-4 border-l-cyan-500/50">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-[9px] font-black text-cyan-400 tracking-[0.2em] mb-1">TRANSACTION #${o._id.slice(-6).toUpperCase()}</p>
                            <h4 class="text-xl font-extrabold text-white">${o.userName}</h4>
                            <p class="text-xs text-slate-500 font-medium">${o.userEmail || 'customer@dilicart.in'}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black text-white italic">₹${o.totalAmount.toLocaleString()}</p>
                            <span class="text-[9px] bg-green-500/10 text-green-400 px-3 py-1 rounded-full border border-green-500/20 font-black">PAID / COD</span>
                        </div>
                    </div>

                    <div class="flex gap-4 overflow-x-auto pb-4 border-b border-white/5 mb-6">
                        ${o.items.map(i => `
                            <div class="relative flex-shrink-0">
                                <img src="${i.image}" class="w-14 h-14 rounded-2xl bg-white/10 p-2 object-contain border border-white/10">
                                <span class="absolute -top-2 -right-2 bg-cyan-500 text-[#080d17] text-[8px] font-black px-2 py-0.5 rounded-full border-2 border-[#080d17]">x1</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="flex gap-4">
                        <button onclick="completeOrder('${o._id}')" class="flex-1 bg-cyan-500/10 hover:bg-cyan-400 hover:text-[#080d17] text-cyan-400 py-3.5 rounded-xl text-xs font-black transition-all border border-cyan-500/20 uppercase tracking-widest">
                            Ship & Complete
                        </button>
                        <button onclick="deleteOrder('${o._id}')" class="px-5 py-3.5 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all border border-red-500/20">
                            🗑️
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // --- ACTIONS ---
        async function completeOrder(id) {
            if(!confirm("Order ship ho gaya?")) return;
            const res = await fetch(`${API}/admin/orders/${id}`, { method: 'DELETE' });
            if(res.ok) {
                showNotification("Order marked as Completed! 📦");
                syncData();
            }
        }

        async function addProduct() {
            const p = {
                name: document.getElementById('p-name').value,
                price: Number(document.getElementById('p-price').value),
                image: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value
            };
            if(!p.name || !p.price) return alert("Fill mandatory fields!");
            
            const res = await fetch(`${API}/admin/add-product`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(p)
            });
            if(res.ok) {
                showNotification("New Tech Live! 🚀");
                location.reload();
            }
        }

        function showNotification(msg) {
            const n = document.createElement('div');
            n.className = "fixed bottom-10 right-10 bg-cyan-500 text-[#080d17] px-8 py-4 rounded-2xl font-black shadow-2xl z-[6000] animate-bounce";
            n.innerText = msg;
            document.body.appendChild(n);
            setTimeout(() => n.remove(), 3000);
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        window.onload = () => {
            const session = sessionStorage.getItem('admin_session');
            if (session) initDashboard(JSON.parse(session));
        };
    </script>
</body>
</html>
